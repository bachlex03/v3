services:
  portfolio:
    container_name: portfolio-app
    build:
      context: ..
      dockerfile: provision/Dockerfile
    restart: always
    deploy:
      resources:
        limits:
          memory: 128M
          cpus: '0.2'

  gateway:
    image: nginx:stable-alpine
    container_name: gateway-proxy
    ports:
      - "80:80"
    volumes:
      - ./nginx-gateway.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - portfolio
    restart: always
