services:
  portfolio:
    container_name: portfolio-app
    image: baledev/portfolio:latest
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - /etc/letsencrypt:/etc/letsencrypt:ro
    restart: always
    deploy:
      resources:
        limits:
          memory: 128M
          cpus: '0.2'
